# Site Info
title:              "KUANHSUN TU"
description:        "A blog built by a NTU CSIE student"
google_verify:       # Put your Google Verification here
google_analytics:

# Author Info
author_name:        "KUANHSUN TU" # Your name here
author_email:       henrydu0413@gmail.com # Your email here
author_gravatar:    a94091534fd2c7bee30fd37f924239d72f7120cdf2aa6e185c0f1bd74a6feb17 # Your Gravatar md5 hash here for logo

# Site Settings
url:                 https://ryanmcdermott.me/jekyll-latex # Change to your site
baseurl:
permalink:          /posts/:title # Post permalink
timezone:           Asia/Taipei # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
mathjax:            true  # enables support for mathjax - set to false to disable

# Site Build
highlighter:        rouge
markdown:           kramdown
kramdown:
    input:          GFM
sass:
    style:          :compressed

# Other Params
include:            [ "robots.txt" ]
exclude:            [ "LICENSE", "README.md", "CNAME", "vendor", "Gemfile" ]
plugins:
  - jekyll-sitemap
  - jekyll-paginate

paginate: 10
paginate_path: "/blog/page:num/"

defaults:
  -
    scope:
      path:         ""
    values:
      layout:       "null"
  -
    scope:
      type:         "pages"
    values:
      layout:       "page"
  -
    scope:
      type:         "posts"
    values:
      layout:       "post"
